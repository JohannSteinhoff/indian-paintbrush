<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- ============================================================
       Symbol library. Reference with:  <use href="assets/logo.svg#id" />
       ============================================================ -->

  <!-- Compact brand mark: a paintbrush whose bristles bloom like the flower -->
  <symbol id="paintbrush-mark" viewBox="0 0 48 48">
    <!-- handle -->
    <rect x="21.5" y="22" width="5" height="22" rx="2.5" fill="#6b4a2b"/>
    <!-- ferrule -->
    <rect x="19.5" y="18" width="9" height="6" rx="1.5" fill="#c9a24b"/>
    <!-- bristle bloom / petals -->
    <g fill="#C1362F">
      <path d="M24 3c2.6 3 3.4 6.4 2.2 9.8C25.4 15 24.6 16 24 18c-.6-2-1.4-3-2.2-5.2C20.6 9.4 21.4 6 24 3z"/>
      <path d="M15.5 8.5c3.6 1.3 5.7 3.9 6.3 7.2.2 1.4 0 2.4.2 4-1.7-1.1-2.8-1.4-4.6-2.7-2.7-2-3.6-5.3-1.9-8.5z" opacity=".92"/>
      <path d="M32.5 8.5c-3.6 1.3-5.7 3.9-6.3 7.2-.2 1.4 0 2.4-.2 4 1.7-1.1 2.8-1.4 4.6-2.7 2.7-2 3.6-5.3 1.9-8.5z" opacity=".92"/>
    </g>
    <g fill="#E4784B">
      <path d="M24 9c1.4 2.2 1.6 4.4.7 6.6-.5 1.2-1 1.8-1.4 3.1-.4-1.3-.9-1.9-1.4-3.1-.9-2.2-.7-4.4.7-6.6z"/>
    </g>
    <!-- a dab of dripping paint -->
    <circle cx="24" cy="21" r="1.6" fill="#E9B44C"/>
  </symbol>

  <!-- Tall decorative flower stalk for the hero -->
  <symbol id="paintbrush-flower" viewBox="0 0 260 420">
    <!-- stem -->
    <path d="M132 415 C126 320 120 250 124 180 C126 150 130 130 130 108"
          fill="none" stroke="#4c6b3f" stroke-width="7" stroke-linecap="round"/>
    <!-- leaves -->
    <path d="M128 300 C96 292 76 268 70 236 C104 244 124 266 128 300z" fill="#5c7d49"/>
    <path d="M132 340 C166 336 190 316 200 286 C166 288 142 306 132 340z" fill="#6b8e54"/>
    <path d="M126 250 C100 238 86 214 86 186 C112 200 124 222 126 250z" fill="#6b8e54"/>

    <!-- flame-like bracts (the 'painted' tips) -->
    <g>
      <path d="M130 112 C112 96 108 70 120 44 C126 60 130 66 132 82 C134 66 138 58 146 44 C156 70 150 98 130 112z" fill="#B02E28"/>
      <path d="M130 108 C118 96 116 78 124 58 C129 72 131 78 132 90 C134 76 137 70 142 58 C150 78 146 98 130 108z" fill="#C1362F"/>
      <path d="M130 104 C122 94 121 82 127 68 C130 78 131 84 132 92 C134 82 136 78 139 68 C145 82 140 96 130 104z" fill="#DC5138"/>
      <path d="M130 98 C125 91 124 84 128 76 C130 82 131 86 132 92 C134 84 135 82 137 76 C141 85 137 92 130 98z" fill="#E9B44C"/>
    </g>
    <!-- side bract buds -->
    <path d="M104 132 C92 122 90 106 98 90 C104 102 106 112 108 126 C110 118 112 114 116 108 C122 120 116 132 104 132z" fill="#C1362F" opacity=".9"/>
    <path d="M156 132 C168 122 170 106 162 90 C156 102 154 112 152 126 C150 118 148 114 144 108 C138 120 144 132 156 132z" fill="#C1362F" opacity=".9"/>
  </symbol>

  <!-- ============ ICONS (24x24, stroke-based) ============ -->
  <symbol id="icon-interior" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M10 21v-6h4v6"/>
  </symbol>
  <symbol id="icon-exterior" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 21h18"/><path d="M5 21V8l7-4 7 4v13"/><path d="M9 21v-5h6v5"/><path d="M9 11h.01M15 11h.01"/>
  </symbol>
  <symbol id="icon-color" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3a9 9 0 1 0 0 18c1.7 0 2-1.3 1.2-2.3-.8-1 .1-2.2 1.3-2.2H16a5 5 0 0 0 5-5c0-4.4-4-8.5-9-8.5z"/><circle cx="7.5" cy="10.5" r="1"/><circle cx="12" cy="7.5" r="1"/><circle cx="16.5" cy="10.5" r="1"/>
  </symbol>
  <symbol id="icon-cabinet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="3" width="16" height="18" rx="1"/><path d="M12 3v18"/><path d="M9 8h.5M14.5 8h.5"/>
  </symbol>
  <symbol id="icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/>
  </symbol>
  <symbol id="icon-mail" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/>
  </symbol>
  <symbol id="icon-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/>
  </symbol>
</svg>
