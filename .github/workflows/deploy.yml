name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for actions/deploy-pages:
#   pages: write     — create the Pages deployment
#   id-token: write  — obtain the OIDC token deploy-pages authenticates with
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish before the next one starts (no self-cancelling races).
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # repo root is the site root; paths are relative

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
